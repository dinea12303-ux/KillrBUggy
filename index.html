<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моя Библиотека</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e26; color: #e0e0e0; max-width: 900px; margin: 0 auto; padding: 20px; }
        h1 { color: #d4a5ff; text-align: center; border-bottom: 2px solid #5a3d7a; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Вкладки */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tabs button { flex: 1; padding: 15px; background: #2b2b36; color: #aaa; border: 2px solid #5a3d7a; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .tabs button.active { background: #5a3d7a; color: white; }
        
        /* Поиск и Книги */
        .search-bar { width: 100%; padding: 15px; font-size: 18px; border-radius: 8px; border: 1px solid #5a3d7a; background: #2b2b36; color: white; margin-bottom: 20px; box-sizing: border-box; }
        .book-section { background: #2b2b36; padding: 20px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid #d4a5ff; }
        .book-title { color: #d4a5ff; border-bottom: 1px solid #5a3d7a; padding-bottom: 10px; margin-top: 0; }
        .chapter-link { display: block; background: #383845; margin: 10px 0; padding: 15px; border-radius: 8px; color: #fff; text-decoration: none; font-size: 18px; transition: 0.2s; }
        .chapter-link:hover { background: #5a5a6a; transform: translateX(5px); }

        /* Админка */
        .admin-panel { background: #2b2b36; padding: 20px; border-radius: 10px; border: 1px dashed #5a3d7a; }
        .admin-panel label { display: block; margin-top: 15px; color: #d4a5ff; font-weight: bold; font-size: 14px; }
        input, textarea { width: 100%; box-sizing: border-box; margin-top: 5px; padding: 12px; border-radius: 5px; border: 1px solid #5a3d7a; background: #1e1e26; color: white; font-size: 16px; }
        .hint { font-size: 12px; color: #888; display: block; margin-top: 5px; }
        .publish-btn { background: #7a4bb5; color: white; border: none; padding: 15px; font-size: 18px; border-radius: 5px; cursor: pointer; width: 100%; font-weight: bold; margin-top: 20px; transition: 0.2s; }
        .publish-btn:hover { background: #9665d4; }
    </style>
</head>
<body>

    <h1>📚 Библиотека Миров</h1>

    <div class="tabs">
        <button id="btn-read" class="active" onclick="switchTab('read')">📖 Читать</button>
        <button id="btn-admin" onclick="switchTab('admin')">⚙️ Редакторская</button>
    </div>

    <div id="tab-read">
        <input type="text" id="search-box" class="search-bar" onkeyup="searchSite()" placeholder="🔍 Быстрый поиск по главам...">
        
        <div id="library-content">
            </div>
    </div>

    <div id="tab-admin" style="display: none;" class="admin-panel">
        <label>Ключ доступа (GitHub Token):</label>
        <input type="password" id="gh-token">
        
        <label>ID Книги (создаст папку, пиши на английском без пробелов):</label>
        <input type="text" id="book-folder" placeholder="Например: lilia_vol1">
        <span class="hint">Чтобы добавить главу в уже существующую книгу, просто напиши ту же самую папку.</span>

        <label>Название Книги (для оглавления):</label>
        <input type="text" id="book-title" placeholder="Например: Том 1. Система Синтеза">

        <label>Номер главы:</label>
        <input type="number" id="chap-num" placeholder="Например: 1">

        <label>Название главы:</label>
        <input type="text" id="chap-title" placeholder="Например: Первая мутация">

        <label>Текст главы:</label>
        <textarea id="chap-text" rows="10" placeholder="Вставляй текст..."></textarea>

        <button class="publish-btn" onclick="publishChapter()" id="pub-btn">Опубликовать главу</button>
        <p id="status-msg" style="text-align: center; font-weight: bold; margin-top: 15px; font-size: 18px;"></p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const savedToken = localStorage.getItem('myGitHubToken');
            if (savedToken) document.getElementById('gh-token').value = savedToken;
        });

        function switchTab(tab) {
            document.getElementById('tab-read').style.display = tab === 'read' ? 'block' : 'none';
            document.getElementById('tab-admin').style.display = tab === 'admin' ? 'block' : 'none';
            document.getElementById('btn-read').className = tab === 'read' ? 'active' : '';
            document.getElementById('btn-admin').className = tab === 'admin' ? 'active' : '';
        }

        function searchSite() {
            let input = document.getElementById('search-box').value.toLowerCase();
            let books = document.querySelectorAll('.book-section');

            books.forEach(book => {
                let links = book.querySelectorAll('.chapter-link');
                let hasVisible = false;
                links.forEach(link => {
                    if (link.innerText.toLowerCase().includes(input)) {
                        link.style.display = 'block';
                        hasVisible = true;
                    } else {
                        link.style.display = 'none';
                    }
                });
                book.style.display = hasVisible ? 'block' : 'none';
            });
        }

        async function publishChapter() {
            const token = document.getElementById('gh-token').value.trim();
            const folder = document.getElementById('book-folder').value.trim().replace(/\s+/g, '_');
            const bookTitle = document.getElementById('book-title').value.trim();
            const num = document.getElementById('chap-num').value.trim();
            const title = document.getElementById('chap-title').value.trim();
            const text = document.getElementById('chap-text').value.trim();
            const status = document.getElementById('status-msg');
            const btn = document.getElementById('pub-btn');

            if (!token || !folder || !bookTitle || !num || !title || !text) {
                status.style.color = "#ff6b6b"; status.innerText = "⚠️ Заполни все поля!"; return;
            }

            localStorage.setItem('myGitHubToken', token);
            btn.disabled = true; status.style.color = "#d4a5ff"; status.innerText = "⏳ Создаю файлы...";

            const repo = "dinea12303-ux/KillrBUggy";
            const currentNum = parseInt(num);
            
            // Код навигации для верха и низа страницы
            const navHtml = `
    <div style="display: flex; justify-content: space-between; align-items: center; margin: 30px 0; font-family: sans-serif; font-size: 16px; background: #2b2b36; padding: 15px; border-radius: 8px;">
        ${currentNum > 1 ? `<a href="chapter${currentNum-1}.html" style="color: #d4a5ff; text-decoration: none; padding: 8px 15px; border: 1px solid #d4a5ff; border-radius: 5px;">⬅️ Предыдущая</a>` : `<span style="color: #555; padding: 8px 15px;">⬅️ Предыдущая</span>`}
        <a href="../index.html" style="color: #fff; text-decoration: none; font-weight: bold; font-size: 18px;">🏠 В Библиотеку</a>
        <a href="chapter${currentNum+1}.html" style="color: #d4a5ff; text-decoration: none; padding: 8px 15px; border: 1px solid #d4a5ff; border-radius: 5px;">Следующая ➡️</a>
    </div>`;

            const paragraphs = text.split('\n').filter(p => p.trim() !== '').map(p => `<p>${p}</p>`).join('\n    ');
            const htmlContent = `<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Глава ${num}: ${title}</title>
    <style>
        body { font-family: 'Georgia', serif; line-height: 1.6; max-width: 800px; margin: 0 auto; padding: 20px; font-size: 20px; color: #d0d0d0; background-color: #1e1e26; }
        p { text-indent: 1.5em; margin-bottom: 1em; }
    </style>
</head>
<body>
    ${navHtml}
    <h2 style="color: #fff; text-align: center;">Глава ${num}. ${title}</h2>
    ${paragraphs}
    ${navHtml}
</body>
</html>`;

            const encodeBase64 = (str) => btoa(unescape(encodeURIComponent(str)));
            const decodeBase64 = (str) => decodeURIComponent(escape(atob(str)));

            try {
                // 1. Заливаем саму главу в папку книги
                let res = await fetch(`https://api.github.com/repos/${repo}/contents/${folder}/chapter${num}.html`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Добавлена глава ${num} в ${folder}`, content: encodeBase64(htmlContent) })
                });

                if (!res.ok) throw new Error("Глава с таким номером уже есть в этой папке, либо ошибка токена.");

                status.innerText = "✅ Глава в папке! Обновляю оглавление...";

                // 2. Обновляем оглавление на главной
                res = await fetch(`https://api.github.com/repos/${repo}/contents/index.html`);
                const indexData = await res.json();
                let indexHtml = decodeBase64(indexData.content);

                const markerEnd = ``;
                const newLink = `\n            <a href="${folder}/chapter${num}.html" class="chapter-link">Глава ${num}. ${title}</a>`;

                if (indexHtml.includes(markerEnd)) {
                    // Книга уже существует, добавляем главу в нее
                    indexHtml = indexHtml.replace(markerEnd, newLink + '\n    ' + markerEnd);
                } else {
                    // Новая книга
                    const newBookBlock = `
    <div class="book-section">
        <h2 class="book-title">📖 ${bookTitle}</h2>${newLink}
    </div>
    `;
                    indexHtml = indexHtml.replace('', newBookBlock + '\n            ');
                }

                res = await fetch(`https://api.github.com/repos/${repo}/contents/index.html`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Обновлено оглавление (${folder})`, content: encodeBase64(indexHtml), sha: indexData.sha })
                });

                if (!res.ok) throw new Error("Не удалось обновить оглавление.");

                status.style.color = "#4caf50";
                status.innerText = `🎉 Готово! Глава добавлена в книгу "${bookTitle}".`;
                
                document.getElementById('chap-num').value = '';
                document.getElementById('chap-title').value = '';
                document.getElementById('chap-text').value = '';

            } catch (error) {
                status.style.color = "#ff6b6b"; status.innerText = `❌ Ошибка: ${error.message}`;
            } finally {
                btn.disabled = false; btn.innerText = "Опубликовать главу";
            }
        }
    </script>
</body>
</html>
